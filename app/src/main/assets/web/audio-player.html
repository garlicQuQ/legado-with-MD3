<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>有声书播放器</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #f5f5f5;
        color: #333;
        overflow: hidden;
      }
      button {
        background: none;
        border: none;
        cursor: pointer;
        font: inherit;
        color: inherit;
        -webkit-tap-highlight-color: transparent;
      }
      img {
        display: block;
        max-width: 100%;
      }
      [hidden] {
        display: none !important;
      }

      :root {
        --primary: #5b6af0;
        --primary-light: #eef0ff;
        --primary-dark: #4a58d4;
        --bg: #f8f9fc;
        --card: #ffffff;
        --text: #1a1d2e;
        --text-secondary: #888fa0;
        --border: #e8eaf0;
        --shadow: 0 2px 12px rgba(67, 67, 107, 0.06);
        --player-h: 200px;
        --controls-h: 84px;
      }

      /* ===== Layout ===== */
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding-bottom: var(--controls-h);
      }

      /* ===== Player Header (Fixed Top) ===== */
      #playerHeader {
        flex-shrink: 0;
        height: var(--player-h);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 16px 20px;
        background: var(--card);
        border-bottom: 1px solid var(--border);
        gap: 8px;
      }
      #coverImg {
        width: 96px;
        height: 96px;
        border-radius: 12px;
        object-fit: cover;
        box-shadow: 0 4px 16px rgba(67, 67, 107, 0.15);
        background: linear-gradient(135deg, #e8eaf0 0%, #f0f1f5 100%);
      }
      #playerChapterTitle {
        font-size: 13px;
        color: var(--primary);
        font-weight: 600;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #progressBar {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--text-secondary);
      }
      #seekSlider {
        flex: 1;
        height: 4px;
        -webkit-appearance: none;
        appearance: none;
        background: var(--border);
        border-radius: 2px;
        outline: none;
      }
      #seekSlider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--primary);
        cursor: pointer;
        box-shadow: 0 2px 4px rgba(91, 106, 240, 0.3);
      }
      #syncStatus {
        font-size: 10px;
        color: #aaa;
        text-align: center;
        min-height: 14px;
      }

      /* ===== Chapter List (Scrollable) ===== */
      #chapterScroll {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        background: var(--bg);
      }
      #chapterList {
        padding: 8px 12px 16px;
      }
      .chapter-item {
        padding: 12px 12px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: 6px;
        transition: background 0.1s;
      }
      .chapter-item:active {
        background: var(--primary-light);
      }
      .chapter-item.active {
        color: var(--primary);
        font-weight: 600;
        background: var(--primary-light);
      }
      .chapter-item.phone-active:not(.active) {
        background: #fff8e1;
      }
      .chapter-item .index {
        width: 32px;
        font-size: 11px;
        color: var(--text-secondary);
        flex-shrink: 0;
      }
      .chapter-item .title {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ===== Bottom Controls (Fixed) ===== */
      #controls {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: var(--controls-h);
        background: var(--card);
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 20px calc(8px + env(safe-area-inset-bottom));
        z-index: 100;
      }
      #mainControls {
        display: flex;
        align-items: center;
        gap: 32px;
      }
      #mainControls button {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--primary-light);
        transition: all 0.15s;
      }
      #mainControls button:active {
        transform: scale(0.9);
      }
      #btnPlay {
        width: 52px !important;
        height: 52px !important;
        font-size: 22px !important;
        background: var(--primary) !important;
        color: #fff !important;
        box-shadow: 0 4px 12px rgba(91, 106, 240, 0.35);
      }
      #extraControls {
        display: flex;
        gap: 16px;
      }
      #extraControls button {
        padding: 4px 12px;
        border-radius: 14px;
        font-size: 12px;
        border: 1px solid var(--border);
        background: var(--bg);
      }
      #extraControls button:active {
        border-color: var(--primary);
        color: var(--primary);
      }
      #timerOptions {
        position: fixed;
        bottom: var(--controls-h);
        left: 0;
        right: 0;
        background: var(--card);
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: center;
        gap: 12px;
        padding: 12px;
        z-index: 99;
      }
      #timerOptions button {
        padding: 8px 20px;
        border-radius: 8px;
        font-size: 13px;
        border: 1px solid var(--border);
        background: var(--bg);
      }

      /* ===== Top Bar ===== */
      #topBar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 44px;
        display: flex;
        align-items: center;
        padding: 0 8px;
        z-index: 101;
        pointer-events: none;
      }
      #topBar button {
        pointer-events: auto;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(4px);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      #topBar button:active {
        transform: scale(0.9);
      }
      #topTitle {
        flex: 1;
        font-size: 15px;
        font-weight: 600;
        text-align: center;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(255, 255, 255, 0.8);
      }

      /* ===== Shelf View ===== */
      #shelfView {
        padding: 16px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 16px;
      }
      .book-card {
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: var(--shadow);
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .book-card:active {
        transform: scale(0.97);
      }
      .book-card img {
        width: 100%;
        aspect-ratio: 3/4;
        object-fit: cover;
        background: linear-gradient(135deg, #e8eaf0 0%, #f0f1f5 100%);
      }
      .book-card .info {
        padding: 10px 12px 12px;
      }
      .book-card .title {
        font-size: 13px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        line-height: 1.4;
      }
      .book-card .author {
        font-size: 11px;
        color: var(--text-secondary);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-top: 3px;
      }

      /* ===== Toast ===== */
      #toast {
        position: fixed;
        top: 60px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        padding: 8px 16px;
        border-radius: 20px;
        font-size: 13px;
        z-index: 300;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      #toast.show {
        opacity: 1;
      }

      /* ===== Container ===== */
      #main {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      #playerView {
        display: none;
        flex-direction: column;
        height: 100%;
      }
      #playerView.active {
        display: flex;
      }
    </style>
  </head>
  <body>
    <!-- Top Bar -->
    <header id="topBar">
      <button id="btnBack" hidden title="返回书架">←</button>
      <span id="topTitle">有声书</span>
    </header>

    <!-- Main Content -->
    <div id="app">
      <main id="main">
        <!-- Shelf View -->
        <section id="shelfView"></section>

        <!-- Player View -->
        <section id="playerView">
          <div id="playerHeader">
            <img id="coverImg" src="" alt="封面" />
            <div id="playerChapterTitle"></div>
            <div id="progressBar">
              <span id="currentTime">0:00</span>
              <input type="range" id="seekSlider" min="0" max="100" value="0" step="1" />
              <span id="totalTime">0:00</span>
            </div>
            <div id="syncStatus"></div>
          </div>
          <div id="chapterScroll">
            <div id="chapterList"></div>
          </div>
        </section>
      </main>

      <!-- Bottom Controls -->
      <div id="controls">
        <div id="mainControls">
          <button id="btnPrev" title="上一集">⏮</button>
          <button id="btnPlay" title="播放/暂停">▶</button>
          <button id="btnNext" title="下一集">⏭</button>
        </div>
        <div id="extraControls">
          <button id="btnSpeed">1.0×</button>
          <button id="btnTimer">🌙</button>
        </div>
      </div>
    </div>

    <!-- Timer Options -->
    <div id="timerOptions" hidden>
      <button data-min="15">15 分钟</button>
      <button data-min="30">30 分钟</button>
      <button data-min="60">60 分钟</button>
      <button data-min="0">取消定时</button>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Audio -->
    <audio id="audio" preload="auto"></audio>

    <script>
      (function () {
        "use strict";

        const state = {
          view: "shelf",
          bookShelf: [],
          currentBook: null,
          chapters: [],
          audioChapters: [],
          currentIndex: 0,
          isPlaying: false,
          playbackRate: parseFloat(localStorage.getItem("audioSpeed") || "1.0"),
          timerMinutes: 0,
          timerId: null,
          saveTimer: null,
          seekTimer: null,
          abortController: null,
          requestId: 0,
        };

        const $ = (id) => document.getElementById(id);
        const audio = $("audio");
        const shelfView = $("shelfView");
        const playerView = $("playerView");
        const chapterList = $("chapterList");
        const chapterScroll = $("chapterScroll");
        const seekSlider = $("seekSlider");
        const btnBack = $("btnBack");
        const btnPlay = $("btnPlay");
        const btnPrev = $("btnPrev");
        const btnNext = $("btnNext");
        const btnSpeed = $("btnSpeed");
        const btnTimer = $("btnTimer");
        const timerOptions = $("timerOptions");
        const topTitle = $("topTitle");
        const toast = $("toast");

        function esc(s) {
          const d = document.createElement("div");
          d.textContent = s || "";
          return d.innerHTML;
        }

        function formatTime(sec) {
          sec = Math.floor(sec || 0);
          const h = Math.floor(sec / 3600);
          const m = Math.floor((sec % 3600) / 60);
          const s = sec % 60;
          if (h > 0)
            return h + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
          return m + ":" + String(s).padStart(2, "0");
        }

        function showToast(msg, ms) {
          toast.textContent = msg;
          toast.classList.add("show");
          clearTimeout(showToast._t);
          showToast._t = setTimeout(() => toast.classList.remove("show"), ms || 2000);
        }

        function coverUrl(book) {
          if (book.customCoverUrl) return book.customCoverUrl;
          if (book.coverUrl && /^https?:/i.test(book.coverUrl)) return book.coverUrl;
          if (book.coverUrl) return "/getCover?url=" + encodeURIComponent(book.bookUrl);
          return "";
        }

        async function apiGet(path) {
          const r = await fetch(path);
          return r.json();
        }

        async function apiPost(path, data) {
          const r = await fetch(path, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          return r.json();
        }

        async function loadShelf() {
          try {
            const data = await apiGet("/getBookshelf");
            state.bookShelf = (data.data || []).filter((b) => (b.type & 32) > 0);
            renderShelf();
          } catch (e) {
            showToast("加载书架失败");
          }
        }

        function renderShelf() {
          if (!state.bookShelf.length) {
            shelfView.innerHTML =
              '<p style="grid-column:1/-1;text-align:center;color:#888;padding:40px">暂无有声书</p>';
            return;
          }
          shelfView.innerHTML = state.bookShelf
            .map(
              (b) => `
                <div class="book-card" data-url="${esc(b.bookUrl)}">
                  <img src="${esc(coverUrl(b))}" alt="" onerror="this.style.visibility='hidden'">
                  <div class="info">
                    <div class="title">${esc(b.name)}</div>
                    <div class="author">${esc(b.author)}</div>
                  </div>
                </div>
              `
            )
            .join("");
          shelfView.querySelectorAll(".book-card").forEach((card) => {
            card.onclick = () => openBook(card.dataset.url);
          });
        }

        async function openBook(bookUrl) {
          startPhonePolling();
          startPeriodicSync();
          try {
            const shelfData = await apiGet("/getBookshelf");
            state.bookShelf = (shelfData.data || []).filter((b) => (b.type & 32) > 0);
          } catch (e) { /* ignore */ }
          const book = state.bookShelf.find((b) => b.bookUrl === bookUrl);
          if (!book) { showToast("未找到书籍"); return; }
          state.currentBook = book;

          try {
            const data = await apiGet("/getChapterList?url=" + encodeURIComponent(bookUrl));
            state.chapters = data.data || [];
            state.audioChapters = state.chapters.filter((c) => !c.isVolume);

            const durIdx = book.durChapterIndex || 0;
            const durPos = (book.durChapterPos || 0) / 1000;
            state.currentIndex = durIdx;

            $("coverImg").src = coverUrl(book);
            $("coverImg").onerror = () => { $("coverImg").style.visibility = "hidden"; };
            topTitle.textContent = book.name;

            showPlayerView();
            renderChapterList();
            await playChapter(durIdx, durPos);
          } catch (e) {
            showToast("加载章节失败: " + e.message);
          }
        }

        async function playChapter(rawIndex, resumePos) {
          const rid = ++state.requestId;
          const audioCh = state.audioChapters.find((c) => c.index === rawIndex);
          if (!audioCh) { showToast("未找到章节"); return; }

          state.currentIndex = rawIndex;

          if (state.abortController) state.abortController.abort();
          state.abortController = new AbortController();

          showToast("正在解析音频地址...");
          try {
            const data = await fetch(
              "/getAudioUrl?url=" + encodeURIComponent(state.currentBook.bookUrl) + "&index=" + rawIndex,
              { signal: state.abortController.signal }
            ).then((r) => r.json());

            if (rid !== state.requestId) return;

            if (data.errorMsg) { showToast(data.errorMsg); return; }
            const playUrl = data.data?.play_url;
            if (!playUrl) { showToast("音频地址为空"); return; }

            audio.src = playUrl;
            audio.playbackRate = state.playbackRate;

            if (resumePos && resumePos > 0) audio.currentTime = resumePos;

            await audio.play();
            state.isPlaying = true;
            updatePlayButton();
            updateChapterTitle();
            highlightActiveChapter();
            scrollToActiveChapter();
            saveProgressDebounced();
          } catch (e) {
            if (e.name === "AbortError") return;
            showToast("播放失败: " + e.message);
          }
        }

        function togglePlay() {
          if (audio.paused) {
            audio.play();
            state.isPlaying = true;
          } else {
            audio.pause();
            state.isPlaying = false;
          }
          updatePlayButton();
          if (!state.isPlaying) flushProgress();
        }

        function prevChapter() {
          const idx = state.audioChapters.findIndex((c) => c.index === state.currentIndex);
          if (idx > 0) playChapter(state.audioChapters[idx - 1].index);
          else showToast("已经是第一集");
        }

        function nextChapter() {
          const idx = state.audioChapters.findIndex((c) => c.index === state.currentIndex);
          if (idx >= 0 && idx < state.audioChapters.length - 1)
            playChapter(state.audioChapters[idx + 1].index);
          else showToast("已经是最后一集");
        }

        function seekTo(position) {
          if (audio.duration) {
            audio.currentTime = position;
            saveProgressDebounced();
          }
        }

        function setPlaybackRate(rate) {
          state.playbackRate = rate;
          audio.playbackRate = rate;
          btnSpeed.textContent = rate.toFixed(2).replace(/0$/, "") + "×";
          localStorage.setItem("audioSpeed", String(rate));
        }

        function cycleSpeed() {
          const speeds = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0, 3.0];
          const idx = speeds.indexOf(state.playbackRate);
          const next = speeds[(idx + 1) % speeds.length];
          setPlaybackRate(next);
        }

        function setTimer(minutes) {
          if (state.timerId) { clearTimeout(state.timerId); state.timerId = null; }
          state.timerMinutes = minutes;
          timerOptions.hidden = true;
          if (minutes > 0) {
            state.timerId = setTimeout(() => {
              audio.pause();
              state.isPlaying = false;
              updatePlayButton();
              flushProgress();
              showToast("定时关闭，已暂停播放");
            }, minutes * 60 * 1000);
            showToast("已设置 " + minutes + " 分钟后关闭");
          } else {
            showToast("已取消定时");
          }
        }

        function saveProgressDebounced() {
          clearTimeout(state.saveTimer);
          state.saveTimer = setTimeout(saveProgress, 3000);
        }

        function saveProgress(isManual = false) {
          if (!state.currentBook) return;
          const savedUrl = state.currentBook.bookUrl;
          const curTitle = state.audioChapters.find((c) => c.index === state.currentIndex)?.title || "";
          const data = {
            bookUrl: savedUrl,
            name: state.currentBook.name,
            author: state.currentBook.author,
            durChapterIndex: state.currentIndex,
            durChapterPos: Math.floor((audio.currentTime || 0) * 1000),
            durChapterTitle: curTitle,
            durChapterTime: Date.now(),
          };
          apiPost("/saveBookProgress", data)
            .then(() => {
              if (state.currentBook && state.currentBook.bookUrl === savedUrl)
                showSyncHint(isManual ? "⤴︎已同步到手机" : "✓已同步");
            })
            .catch(() => {});
        }

        function flushProgress() {
          clearTimeout(state.saveTimer);
          saveProgress(true);
        }

        function updatePlayButton() {
          const icon = state.isPlaying ? "⏸" : "▶";
          btnPlay.textContent = icon;
        }

        function updateChapterTitle() {
          const ch = state.audioChapters.find((c) => c.index === state.currentIndex);
          const title = ch ? ch.title : "";
          $("playerChapterTitle").textContent = title;
          const dbgEl = $("syncStatus");
          if (dbgEl)
            dbgEl.innerHTML = `<span style="color:#aaa">idx=${state.currentIndex}</span>&nbsp;&nbsp;<span id="syncHint"></span>`;
        }

        function showSyncHint(msg) {
          const el = $("syncHint");
          if (el) {
            el.textContent = msg;
            clearTimeout(el._t);
            if (msg) el._t = setTimeout(() => (el.textContent = ""), 2000);
          }
        }

        function highlightActiveChapter() {
          chapterList.querySelectorAll(".chapter-item").forEach((el) => {
            el.classList.toggle("active", parseInt(el.dataset.index) === state.currentIndex);
          });
        }

        function scrollToActiveChapter() {
          const active = chapterList.querySelector(".chapter-item.active");
          if (active) {
            setTimeout(() => active.scrollIntoView({ block: "center", behavior: "smooth" }), 150);
          }
        }

        function showPlayerView() {
          state.view = "player";
          shelfView.hidden = true;
          playerView.classList.add("active");
          btnBack.hidden = false;
          $("main").style.overflow = "hidden";
        }

        function showShelfView() {
          state.view = "shelf";
          shelfView.hidden = false;
          playerView.classList.remove("active");
          btnBack.hidden = true;
          topTitle.textContent = "有声书";
          $("main").style.overflow = "";
        }

        function renderChapterList() {
          chapterList.innerHTML = state.audioChapters
            .map((c) => {
              const idx = state.audioChapters.indexOf(c) + 1;
              return `
                <div class="chapter-item" data-index="${c.index}">
                  <span class="index">${idx}</span>
                  <span class="title">${esc(c.title)}</span>
                </div>
              `;
            })
            .join("");
          chapterList.querySelectorAll(".chapter-item").forEach((el) => {
            el.onclick = () => playChapter(parseInt(el.dataset.index));
          });
        }

        audio.addEventListener("timeupdate", () => {
          if (!audio.duration) return;
          const pct = (audio.currentTime / audio.duration) * 100;
          seekSlider.value = pct;
          $("currentTime").textContent = formatTime(audio.currentTime);
          saveProgressDebounced();
        });

        audio.addEventListener("loadedmetadata", () => {
          $("totalTime").textContent = formatTime(audio.duration);
          seekSlider.max = 100;
        });

        audio.addEventListener("ended", () => nextChapter());

        audio.addEventListener("play", () => { state.isPlaying = true; updatePlayButton(); });

        audio.addEventListener("pause", () => {
          state.isPlaying = false;
          updatePlayButton();
          flushProgress();
        });

        audio.addEventListener("error", () => { if (audio.src) showToast("音频加载失败"); });

        seekSlider.addEventListener("input", () => {
          if (!audio.duration) return;
          const pos = (seekSlider.value / 100) * audio.duration;
          $("currentTime").textContent = formatTime(pos);
        });

        seekSlider.addEventListener("change", () => {
          if (!audio.duration) return;
          const pos = (seekSlider.value / 100) * audio.duration;
          seekTo(pos);
        });

        btnBack.onclick = () => {
          flushProgress();
          stopPhonePolling();
          stopPeriodicSync();
          audio.pause();
          state.isPlaying = false;
          updatePlayButton();
          loadShelf();
          showShelfView();
        };
        btnPlay.onclick = togglePlay;
        btnPrev.onclick = prevChapter;
        btnNext.onclick = nextChapter;
        btnSpeed.onclick = cycleSpeed;
        btnTimer.onclick = () => { timerOptions.hidden = !timerOptions.hidden; };

        timerOptions.querySelectorAll("button").forEach((btn) => {
          btn.onclick = () => setTimer(parseInt(btn.dataset.min));
        });

        let phonePollingId = null;
        let syncTimerId = null;

        function startPhonePolling() {
          if (phonePollingId) return;
          phonePollingId = setInterval(syncFromPhone, 5000);
        }
        function stopPhonePolling() {
          if (phonePollingId) { clearInterval(phonePollingId); phonePollingId = null; }
        }
        function startPeriodicSync() {
          if (syncTimerId) return;
          syncTimerId = setInterval(() => {
            if (state.currentBook && state.isPlaying) saveProgressDebounced();
          }, 5000);
        }
        function stopPeriodicSync() {
          if (syncTimerId) { clearInterval(syncTimerId); syncTimerId = null; }
        }

        let lastSyncedPhoneIndex = null;
        async function syncFromPhone() {
          if (!state.currentBook) return;
          try {
            const data = await apiGet("/getBookshelf");
            const books = data.data || [];
            const book = books.find((b) => b.bookUrl === state.currentBook.bookUrl);
            if (!book) return;
            const phoneIndex = book.durChapterIndex || 0;
            if (phoneIndex !== lastSyncedPhoneIndex) {
              lastSyncedPhoneIndex = phoneIndex;
              highlightPhoneChapter(phoneIndex);
              if (phoneIndex !== state.currentIndex) showSyncHint("📱 手机正在播放其他章节");
            }
          } catch (e) { /* ignore */ }
        }

        function highlightPhoneChapter(phoneIndex) {
          chapterList.querySelectorAll(".chapter-item").forEach((el) => {
            const idx = parseInt(el.dataset.index);
            el.classList.toggle("phone-active", idx === phoneIndex);
          });
        }

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            flushProgress();
            stopPhonePolling();
            stopPeriodicSync();
          } else {
            startPhonePolling();
            startPeriodicSync();
          }
        });

        window.addEventListener("beforeunload", flushProgress);

        setPlaybackRate(state.playbackRate);
        startPeriodicSync();
        loadShelf();
      })();
    </script>
  </body>
</html>
